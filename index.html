<!DOCTYPE html>
<html>
<head>
<title>Selenium Actions Demo</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

h2{
color:#333;
}

.container{
display:flex;
justify-content:center;
gap:60px;
margin-top:30px;
}

.box{
width:150px;
height:150px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

#dragBox{
background:#ff9800;
color:white;
cursor:grab;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

#dropArea{
border:3px dashed #444;
color:#444;
background:white;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;
margin-top:30px;
}

button:hover{
background:#3c8c3f;
}

#rightClickArea{
width:220px;
height:100px;
background:#2196F3;
color:white;
margin:30px auto;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
}

input{
padding:10px;
width:250px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

<script>

function allowDrop(ev){
ev.preventDefault();
}

function drag(ev){
ev.dataTransfer.setData("text", ev.target.id);
}

function drop(ev){
ev.preventDefault();

var data = ev.dataTransfer.getData("text");
var element = document.getElementById(data);

ev.target.innerHTML = "";  // remove DROP HERE text
ev.target.appendChild(element);
}

function doubleClickMessage(){
alert("Double Click Successful!");
}

</script>

</head>

<body>

<h2>Selenium Actions Class Practice Page</h2>

<h3>Drag and Drop Example</h3>

<div class="container">

<div id="dragBox" class="box" draggable="true" ondragstart="drag(event)">
DRAG
</div>

<div id="dropArea" class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
DROP
</div>

</div>

<h3>Double Click Example</h3>

<button id="doubleClickBtn" ondblclick="doubleClickMessage()">
Double Click Me
</button>

<h3>Right Click Area</h3>

<div id="rightClickArea">
Right Click Here
</div>

<h3>Keyboard Input</h3>

<input type="text" id="nameBox" placeholder="Type your name">

</body>
</html>
